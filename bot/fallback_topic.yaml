kind: AdaptiveDialog
beginDialog:
  kind: OnActivity
  id: main
  type: Message
  actions:
    - kind: SetVariable
      id: setVariable_cwLQAj
      variable: Topic.IsUserMessageSent
      value: =false

    - kind: InvokeFlowAction
      id: invokeFlowAction_02aKzx
      input:
        binding:
          boolean: =Topic.IsUserMessageSent
          text: =System.User.Email
          text_1: =System.Conversation.Id
          text_2: =System.Activity.Text

      output:
        binding:
          isfollowupexpecterd: Topic.Is_Followup_Expected
          responsetext: Topic.Response

      # WARNING: This flow ID MUST match RELAY_FLOW_ID in scripts/configure_bot_topic.py.
      # SendMessage flow: dec9329f-8112-f111-8341-002248d570fd
      flowId: dec9329f-8112-f111-8341-002248d570fd

    - kind: SendActivity
      id: sendActivity_ePCiZl
      activity: "{Topic.Response}"

    - kind: ConditionGroup
      id: conditionGroup_avBqa5
      conditions:
        - id: conditionItem_puL5pB
          condition: =Topic.Is_Followup_Expected = true

      elseActions:
        - kind: EndDialog
          id: 6pGFeU

    - kind: SetVariable
      id: setVariable_Sse74G
      variable: Topic.IsUserMessageSent
      value: =true

    - kind: GotoAction
      id: Ju3RPV
      actionId: invokeFlowAction_02aKzx

inputType: {}
outputType: {}
